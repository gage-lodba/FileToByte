name: Build and Release

on:
  push:
    # No paths filter on push: a v* tag push carries no "changed files", so a
    # paths filter would skip the run — including the release job. Branch-push
    # noise is filtered on the pull_request side instead.
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'source/**'
      - 'CMakeLists.txt'
      - '.clang-tidy'
      - '.gitmodules'
      - 'deps/VulkanWindow'

concurrency:
  # Cancel superseded runs on the same ref. Distinct refs get distinct groups,
  # so a tag's release run is never cancelled by a later push to main.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve Vulkan SDK version
        id: vksdk
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://vulkan.lunarg.com/sdk/latest/windows.json -OutFile windows.json
          $version = (Get-Content windows.json | ConvertFrom-Json).windows
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "VULKAN_SDK=C:\VulkanSDK\$version" >> $env:GITHUB_ENV

      - name: Cache Vulkan SDK
        id: cache-vulkan-sdk
        uses: actions/cache@v4
        with:
          path: C:\VulkanSDK\${{ steps.vksdk.outputs.version }}
          key: vulkan-sdk-windows-${{ steps.vksdk.outputs.version }}

      - name: Install Vulkan SDK
        if: steps.cache-vulkan-sdk.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Start-BitsTransfer -Source https://sdk.lunarg.com/sdk/download/latest/windows/vulkan_sdk.exe -Destination vulkan_sdk.exe
          .\vulkan_sdk.exe --accept-licenses --default-answer --confirm-command install

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-latest
          path: build/Release/FileToByte.exe

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build deps
        # GLFW is built from the VulkanWindow submodule, so we need its X11 +
        # Wayland build deps (not a prebuilt libglfw3): xorg-dev is GLFW's
        # recommended X11 metapackage; libxkbcommon-dev is used by both backends
        # and isn't part of xorg-dev; Wayland needs libwayland-dev,
        # wayland-scanner (libwayland-bin), and wayland-protocols.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            vulkan-tools libvulkan-dev \
            xorg-dev libxkbcommon-dev \
            libwayland-dev libwayland-bin wayland-protocols

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ github.job }}

      - name: Configure
        # Route the compilers through ccache so the vendored deps
        # (GLFW/ImGui/VMA) aren't recompiled from scratch on every run.
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-latest
          path: build/FileToByte

  smoke:
    name: Smoke test (lavapipe + validation)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        # mesa-vulkan-drivers ships the lavapipe software ICD (the runners have
        # no GPU); vulkan-validationlayers ships VK_LAYER_KHRONOS_validation;
        # xvfb gives the GLFW window a virtual X server. The xorg/wayland deps
        # are GLFW's build deps (same set as build-linux).
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev vulkan-validationlayers mesa-vulkan-drivers xvfb \
            xorg-dev libxkbcommon-dev \
            libwayland-dev libwayland-bin wayland-protocols

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ github.job }}

      - name: Configure (Debug compiles in the validation layer)
        run: |
          cmake -B build-debug -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build-debug --config Debug

      - name: Run headless under lavapipe with validation made fatal
        # Renders a fixed number of frames then exits; aborts with a non-zero
        # status on any validation error or synchronization hazard, so a
        # regression that compiles cleanly (e.g. the libc open() symbol
        # collision) still fails CI.
        run: |
          set -euo pipefail

          LVP="$(ls /usr/share/vulkan/icd.d/lvp_icd*.json 2>/dev/null | head -n1 || true)"
          if [ -z "$LVP" ]; then
            echo "::error::lavapipe ICD not found"
            ls -la /usr/share/vulkan/icd.d/ || true
            exit 1
          fi
          export VK_ICD_FILENAMES="$LVP" VK_DRIVER_FILES="$LVP"
          echo "lavapipe ICD: $LVP"

          # Guard against a false pass where the validation layer is missing and
          # the app silently runs without it.
          ls /usr/share/vulkan/explicit_layer.d/ | grep -qi validation \
            || { echo "::error::validation layer manifest not installed"; exit 1; }

          VULKANWINDOW_MAX_FRAMES=10 VULKANWINDOW_VALIDATION_ABORT=1 \
            xvfb-run -a ./build-debug/FileToByte

  tidy:
    name: clang-tidy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        # Same configure-time deps as build-linux (find_package(Vulkan) + GLFW's
        # X11/Wayland deps) plus clang-tidy itself. No build is needed: a
        # configure generates compile_commands.json, which is all clang-tidy
        # consumes — the VulkanWindow/imgui/glfw headers it pulls in are present
        # in the checked-out source tree.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-tidy \
            libvulkan-dev \
            xorg-dev libxkbcommon-dev \
            libwayland-dev libwayland-bin wayland-protocols

      - name: Configure
        # CMAKE_EXPORT_COMPILE_COMMANDS is forced on in CMakeLists.txt, so this
        # writes build/compile_commands.json.
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Run clang-tidy
        # Lint FileToByte's own sources only — the $(pwd)/source/ anchor excludes
        # the deps/VulkanWindow/source entries in the compile DB. -quiet keeps the
        # log readable; -warnings-as-errors='*' makes any diagnostic fail the job.
        run: |
          run-clang-tidy -p build -quiet -warnings-as-errors='*' \
            "$(pwd)/source/.*\.(cpp|h)$"

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, smoke, tidy]
    # Only publish a GitHub Release when a v* tag is pushed — not on every push
    # to main. Build + smoke still run on all pushes/PRs.
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ubuntu-latest

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-latest

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            FileToByte
            FileToByte.exe
